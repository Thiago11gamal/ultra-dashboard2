name: Evolution Tests

on:
  push:
    paths:
      - 'src/components/charts/EvolutionChart/**'
      - 'src/components/charts/EvolutionHeatmap.jsx'
      - 'src/engine/projection.js'
      - 'src/utils/monteCarloScenario.js'
      - 'src/utils/heatmapAggregation.js'
      - 'src/utils/weeklyEvolutionInsights.js'
      - 'scripts/test-*.mjs'
      - 'package.json'
      - 'docs/EVOLUTION_TESTS.md'
      - 'src/pages/Coach.jsx'
      - 'src/utils/coachLogic.js'
      - 'tests/coach-*.test.js'
      - 'src/utils/__tests__/coach*.test.js'
  pull_request:
    paths:
      - 'src/components/charts/EvolutionChart/**'
      - 'src/components/charts/EvolutionHeatmap.jsx'
      - 'src/engine/projection.js'
      - 'src/utils/monteCarloScenario.js'
      - 'src/utils/heatmapAggregation.js'
      - 'src/utils/weeklyEvolutionInsights.js'
      - 'scripts/test-*.mjs'
      - 'package.json'
      - 'docs/EVOLUTION_TESTS.md'
      - 'src/pages/Coach.jsx'
      - 'src/utils/coachLogic.js'
      - 'tests/coach-*.test.js'
      - 'src/utils/__tests__/coach*.test.js'

jobs:
  evolution-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run evolution matrix
        run: npm run test:evolution-all

      - name: Run coach suite
        run: npm run test:coach-suite

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
